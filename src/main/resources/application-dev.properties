# Development Profile Configuration

# H2 File Database (로컬 개발용, PostgreSQL 호환 모드)
# MODE=PostgreSQL: BIGSERIAL 등 PostgreSQL 문법 지원 → Flyway 마이그레이션 공유 가능
spring.datasource.url=jdbc:h2:file:./data/monitor;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA (Flyway가 스키마 관리 — dev/prod 동일하게 none)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Flyway 활성화 (dev도 Flyway로 스키마 관리 → dev/prod 발산 방지)
spring.flyway.enabled=true
# baseline-version=0: 신규 H2에서 V1부터 실행되도록 오버라이드
# (base application.properties의 baseline-version=1은 prod 기존 DB용 설정)
spring.flyway.baseline-version=0

# API Security (개발 환경에서는 비활성화)
api.security.enabled=false

# Logging (개발 환경에서는 더 상세한 로그)
logging.level.com.webmonitor=DEBUG
logging.level.org.springframework.web=DEBUG

# Actuator (개발 환경에서는 모든 엔드포인트 노출)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
