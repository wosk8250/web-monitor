<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 모니터링 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .tab-button {
            transition: all 0.3s;
        }
        .tab-button.active {
            background-color: #3b82f6;
            color: white;
        }
        .notification {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .keyword-tag {
            display: inline-block;
            margin: 2px;
            padding: 4px 8px;
            background-color: #1e40af;
            color: #dbeafe;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- 헤더 -->
    <header class="bg-slate-800 shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-blue-400">🔍 웹 모니터링 시스템</h1>
                <div class="flex items-center space-x-4">
                    <div id="sseStatus" class="flex items-center space-x-2">
                        <div class="w-3 h-3 rounded-full bg-gray-500"></div>
                        <span class="text-sm">연결 대기중</span>
                    </div>
                    <button onclick="connectSSE()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm">
                        SSE 재연결
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 탭 메뉴 -->
    <div class="container mx-auto px-4 mt-6">
        <div class="flex space-x-2 border-b border-slate-700">
            <button onclick="switchTab('sites')" id="tab-sites" class="tab-button px-6 py-3 rounded-t-lg active">
                사이트 관리
            </button>
            <button onclick="switchTab('alerts')" id="tab-alerts" class="tab-button px-6 py-3 rounded-t-lg">
                알림 목록
            </button>
            <button onclick="switchTab('settings')" id="tab-settings" class="tab-button px-6 py-3 rounded-t-lg">
                설정
            </button>
        </div>
    </div>

    <!-- 메인 컨텐츠 -->
    <div class="container mx-auto px-4 py-6">
        <!-- 사이트 관리 탭 -->
        <div id="content-sites" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 사이트 등록 폼 -->
                <div class="lg:col-span-1">
                    <div class="bg-slate-800 rounded-lg shadow-lg p-6">
                        <h2 class="text-xl font-bold mb-4 text-blue-400">사이트 등록</h2>
                        <form id="siteForm" onsubmit="createSite(event)">
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">사이트 이름</label>
                                <input type="text" id="siteName" required
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">URL</label>
                                <input type="url" id="siteUrl" required
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">체크 주기 (분)</label>
                                <input type="number" id="siteCheckInterval" value="1" min="1" required
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">키워드 (선택사항)</label>
                                <input type="text" id="siteKeywords" placeholder="긴급,공지,중요 (쉼표로 구분, 공백 시 새글 알림)"
                                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <p class="text-xs text-slate-400 mt-1">키워드를 입력하지 않으면 자동으로 새글 알림으로 설정됩니다.</p>
                            </div>
                            <button type="submit"
                                class="w-full bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium transition">
                                등록하기
                            </button>
                        </form>
                    </div>
                </div>

                <!-- 사이트 목록 -->
                <div class="lg:col-span-2">
                    <div class="bg-slate-800 rounded-lg shadow-lg p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold text-blue-400">등록된 사이트</h2>
                            <button onclick="loadSites()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                                새로고침
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="border-b border-slate-700">
                                    <tr>
                                        <th class="text-left py-3 px-4">이름</th>
                                        <th class="text-left py-3 px-4">URL</th>
                                        <th class="text-center py-3 px-4">주기(분)</th>
                                        <th class="text-left py-3 px-4">키워드</th>
                                        <th class="text-center py-3 px-4">상태</th>
                                        <th class="text-center py-3 px-4">작업</th>
                                    </tr>
                                </thead>
                                <tbody id="sitesTable">
                                    <tr>
                                        <td colspan="6" class="text-center py-8 text-gray-500">
                                            사이트를 불러오는 중...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 알림 목록 탭 -->
        <div id="content-alerts" class="tab-content hidden">
            <div class="bg-slate-800 rounded-lg shadow-lg p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-blue-400">알림 목록</h2>
                    <div class="flex items-center space-x-2">
                        <select id="siteFilter" onchange="loadAlerts()" class="px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                            <option value="">전체 사이트</option>
                        </select>
                        <button onclick="loadAlerts()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
                            새로고침
                        </button>
                        <button onclick="deleteAllAlerts()" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm">
                            모두 삭제
                        </button>
                    </div>
                </div>
                <div id="alertsList" class="space-y-3">
                    <div class="text-center py-8 text-gray-500">
                        알림을 불러오는 중...
                    </div>
                </div>
            </div>
        </div>

        <!-- 설정 탭 -->
        <div id="content-settings" class="tab-content hidden">
            <div class="max-w-2xl mx-auto">
                <div class="bg-slate-800 rounded-lg shadow-lg p-6">
                    <h2 class="text-xl font-bold mb-6 text-blue-400">시스템 설정</h2>
                    <form id="settingsForm" onsubmit="saveSettings(event)">
                        <div class="mb-6">
                            <label class="block text-sm font-medium mb-2">디스코드 웹훅 URL</label>
                            <input type="url" id="discordWebhookUrl"
                                class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="https://discord.com/api/webhooks/...">
                            <p class="text-xs text-gray-400 mt-1">디스코드 서버 설정에서 웹훅 URL을 생성하여 입력하세요.</p>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium mb-2">알림 제목</label>
                            <input type="text" id="notificationTitle"
                                class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                placeholder="웹 모니터링 알림">
                        </div>
                        <div class="mb-6">
                            <label class="flex items-center space-x-3">
                                <input type="checkbox" id="settingsEnabled"
                                    class="w-5 h-5 bg-slate-700 border-slate-600 rounded focus:ring-2 focus:ring-blue-500">
                                <span class="text-sm font-medium">알림 활성화</span>
                            </label>
                        </div>
                        <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium transition">
                            설정 저장
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 키워드 수정 모달 -->
    <div id="keywordModal" class="modal">
        <div class="bg-slate-800 rounded-lg shadow-xl p-6 w-full max-w-2xl mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-blue-400">키워드 관리</h3>
                <button onclick="closeKeywordModal()" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="mb-4">
                <p class="text-sm text-gray-400 mb-2">사이트: <span id="modalSiteName" class="text-white font-medium"></span></p>
            </div>

            <div class="mb-6">
                <h4 class="text-sm font-medium mb-2">현재 키워드</h4>
                <div id="currentKeywords" class="min-h-[60px] p-3 bg-slate-700 rounded-lg">
                    <p class="text-sm text-gray-400">로딩 중...</p>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">새 키워드 추가</label>
                <input type="text" id="newKeywordInput" placeholder="긴급,공지,중요 (쉼표로 구분)"
                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div class="flex space-x-2">
                <button onclick="saveKeywords()" class="flex-1 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium transition">
                    저장
                </button>
                <button onclick="closeKeywordModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg font-medium transition">
                    취소
                </button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 컨테이너 -->
    <div id="toastContainer" class="fixed top-4 right-4 space-y-2 z-50"></div>

    <script>
        let eventSource = null;
        let sites = [];
        let currentSiteId = null;
        let siteKeywords = {};

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            loadSites();
            loadSitesForFilter(); // 사이트 필터 드롭다운 초기화
            loadAlerts();
            loadSettings();
            connectSSE();
            runTests(); // 테스트 실행
        });

        // SSE 연결
        function connectSSE() {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/api/sse/subscribe');

            eventSource.addEventListener('connected', function(event) {
                updateSSEStatus(true);
                showToast('SSE 연결 성공', 'success');
            });

            eventSource.addEventListener('alert', function(event) {
                const alert = JSON.parse(event.data);
                showToast(`🔔 ${alert.message}`, 'info');
                loadAlerts();
            });

            eventSource.onerror = function(error) {
                updateSSEStatus(false);
                console.error('SSE 오류:', error);
            };
        }

        // SSE 상태 업데이트
        function updateSSEStatus(connected) {
            const statusDiv = document.getElementById('sseStatus');
            if (connected) {
                statusDiv.innerHTML = `
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="text-sm">연결됨</span>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <span class="text-sm">연결 끊김</span>
                `;
            }
        }

        // 탭 전환
        function switchTab(tabName) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('tab-' + tabName).classList.add('active');

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById('content-' + tabName).classList.remove('hidden');
        }

        // 사이트 목록 불러오기
        async function loadSites() {
            try {
                const response = await fetch('/api/sites');
                sites = await response.json();

                // 각 사이트의 키워드 개수 조회
                for (let site of sites) {
                    const keywordsResponse = await fetch(`/api/keywords/site/${site.id}`);
                    const keywords = await keywordsResponse.json();
                    siteKeywords[site.id] = keywords;
                }

                const tbody = document.getElementById('sitesTable');
                if (sites.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">등록된 사이트가 없습니다.</td></tr>';
                    return;
                }

                tbody.innerHTML = sites.map(site => {
                    const keywords = siteKeywords[site.id] || [];
                    const hasKeywords = keywords.length > 0;

                    return `
                    <tr class="border-b border-slate-700 hover:bg-slate-700">
                        <td class="py-3 px-4 font-medium">${site.name}</td>
                        <td class="py-3 px-4 text-sm text-gray-400">${site.url}</td>
                        <td class="py-3 px-4 text-center">${site.checkInterval}</td>
                        <td class="py-3 px-4">
                            ${hasKeywords
                                ? keywords.map(k => `<span class="keyword-tag">${k.keyword}</span>`).join(' ')
                                : '<span class="px-2 py-1 bg-purple-900 text-purple-300 rounded text-xs">🔔 새글 알림</span>'
                            }
                        </td>
                        <td class="py-3 px-4 text-center">
                            <button onclick="toggleSite(${site.id})" class="px-3 py-1 rounded text-xs ${site.active ? 'bg-green-900 text-green-300' : 'bg-gray-700 text-gray-400'}">
                                ${site.active ? '활성' : '비활성'}
                            </button>
                        </td>
                        <td class="py-3 px-4 text-center space-x-1">
                            <button onclick="openKeywordModal(${site.id})" class="px-3 py-1 bg-blue-900 text-blue-300 rounded text-xs hover:bg-blue-800">
                                키워드
                            </button>
                            <button onclick="deleteSite(${site.id})" class="px-3 py-1 bg-red-900 text-red-300 rounded text-xs hover:bg-red-800">
                                삭제
                            </button>
                        </td>
                    </tr>
                `;
                }).join('');
            } catch (error) {
                console.error('사이트 목록 로드 실패:', error);
                showToast('사이트 목록 로드 실패', 'error');
            }
        }

        // 사이트 등록
        async function createSite(event) {
            event.preventDefault();

            const keywordsInput = document.getElementById('siteKeywords').value.trim();
            const keywords = keywordsInput ? keywordsInput.split(',').map(k => k.trim()).filter(k => k) : [];

            const site = {
                name: document.getElementById('siteName').value,
                url: document.getElementById('siteUrl').value,
                checkInterval: parseInt(document.getElementById('siteCheckInterval').value),
                active: true,
                detectContentChange: keywords.length === 0 // 키워드 없으면 자동으로 전체 페이지 변경 감지
            };

            try {
                const response = await fetch('/api/sites', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(site)
                });

                if (response.ok) {
                    const createdSite = await response.json();

                    // 키워드가 있으면 각각 등록
                    if (keywords.length > 0) {
                        for (let keyword of keywords) {
                            await fetch('/api/keywords', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    keyword: keyword,
                                    siteId: createdSite.id,
                                    active: true
                                })
                            });
                        }
                    }

                    showToast(`사이트가 등록되었습니다. ${keywords.length > 0 ? `(키워드 ${keywords.length}개)` : '(새글 알림)'}`, 'success');
                    document.getElementById('siteForm').reset();
                    loadSites();
                } else {
                    showToast('사이트 등록 실패', 'error');
                }
            } catch (error) {
                console.error('사이트 등록 실패:', error);
                showToast('사이트 등록 실패', 'error');
            }
        }

        // 사이트 활성화/비활성화 토글
        async function toggleSite(id) {
            try {
                const response = await fetch(`/api/sites/${id}/toggle`, {
                    method: 'PATCH'
                });

                if (response.ok) {
                    showToast('사이트 상태가 변경되었습니다.', 'success');
                    loadSites();
                } else {
                    showToast('상태 변경 실패', 'error');
                }
            } catch (error) {
                console.error('상태 변경 실패:', error);
                showToast('상태 변경 실패', 'error');
            }
        }

        // 사이트 삭제
        async function deleteSite(id) {
            if (!confirm('정말 이 사이트를 삭제하시겠습니까?')) {
                return;
            }

            try {
                const response = await fetch(`/api/sites/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast('사이트가 삭제되었습니다.', 'success');
                    loadSites();
                } else {
                    showToast('사이트 삭제 실패', 'error');
                }
            } catch (error) {
                console.error('사이트 삭제 실패:', error);
                showToast('사이트 삭제 실패', 'error');
            }
        }

        // 키워드 수정 모달 열기
        async function openKeywordModal(siteId) {
            currentSiteId = siteId;
            const site = sites.find(s => s.id === siteId);

            document.getElementById('modalSiteName').textContent = site.name;
            document.getElementById('newKeywordInput').value = '';

            // 현재 키워드 로드
            await loadCurrentKeywords(siteId);

            document.getElementById('keywordModal').classList.add('active');
        }

        // 현재 키워드 로드
        async function loadCurrentKeywords(siteId) {
            try {
                const response = await fetch(`/api/keywords/site/${siteId}`);
                const keywords = await response.json();

                const container = document.getElementById('currentKeywords');
                if (keywords.length === 0) {
                    container.innerHTML = '<p class="text-sm text-gray-400">등록된 키워드가 없습니다. (새글 알림 모드)</p>';
                } else {
                    container.innerHTML = keywords.map(k => `
                        <span class="inline-flex items-center keyword-tag mb-1">
                            ${k.keyword}
                            <button onclick="deleteKeywordFromModal(${k.id})" class="ml-2 text-red-300 hover:text-red-200">×</button>
                        </span>
                    `).join(' ');
                }
            } catch (error) {
                console.error('키워드 로드 실패:', error);
            }
        }

        // 모달에서 키워드 삭제
        async function deleteKeywordFromModal(keywordId) {
            try {
                const response = await fetch(`/api/keywords/${keywordId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadCurrentKeywords(currentSiteId);
                    showToast('키워드가 삭제되었습니다.', 'success');
                } else {
                    showToast('키워드 삭제 실패', 'error');
                }
            } catch (error) {
                console.error('키워드 삭제 실패:', error);
                showToast('키워드 삭제 실패', 'error');
            }
        }

        // 키워드 저장
        async function saveKeywords() {
            const newKeywordsInput = document.getElementById('newKeywordInput').value.trim();
            if (!newKeywordsInput) {
                closeKeywordModal();
                loadSites();
                return;
            }

            const keywords = newKeywordsInput.split(',').map(k => k.trim()).filter(k => k);

            try {
                for (let keyword of keywords) {
                    await fetch('/api/keywords', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            keyword: keyword,
                            siteId: currentSiteId,
                            active: true
                        })
                    });
                }

                showToast(`${keywords.length}개의 키워드가 추가되었습니다.`, 'success');
                await loadCurrentKeywords(currentSiteId);
                document.getElementById('newKeywordInput').value = '';
                loadSites();
            } catch (error) {
                console.error('키워드 추가 실패:', error);
                showToast('키워드 추가 실패', 'error');
            }
        }

        // 키워드 모달 닫기
        function closeKeywordModal() {
            document.getElementById('keywordModal').classList.remove('active');
            currentSiteId = null;
            loadSites();
        }

        // 알림 목록 불러오기
        async function loadAlerts() {
            try {
                // 선택된 사이트 필터 가져오기
                const siteFilter = document.getElementById('siteFilter');
                const selectedSiteId = siteFilter ? siteFilter.value : '';

                // 필터에 따라 API 엔드포인트 결정
                const url = selectedSiteId ? `/api/alerts/site/${selectedSiteId}` : '/api/alerts';
                const response = await fetch(url);
                const alerts = await response.json();

                const alertsList = document.getElementById('alertsList');
                if (alerts.length === 0) {
                    alertsList.innerHTML = '<div class="text-center py-8 text-gray-500">알림이 없습니다.</div>';
                    return;
                }

                alertsList.innerHTML = alerts.map(alert => `
                    <div class="bg-slate-700 rounded-lg p-4 ${!alert.sent ? 'border-l-4 border-blue-500' : ''}">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center space-x-2 mb-2">
                                    <span class="px-2 py-1 bg-blue-900 text-blue-300 rounded text-xs">${alert.siteName}</span>
                                    ${alert.keywordText ? `<span class="px-2 py-1 bg-purple-900 text-purple-300 rounded text-xs">${alert.keywordText}</span>` : '<span class="px-2 py-1 bg-purple-900 text-purple-300 rounded text-xs">페이지 변경</span>'}
                                    ${!alert.sent ? '<span class="px-2 py-1 bg-red-900 text-red-300 rounded text-xs">새 알림</span>' : ''}
                                </div>
                                ${alert.pageTitle ? `<a href="#" onclick="markAlertAsReadAndOpen(${alert.id}, '${alert.detectedUrl}', ${alert.sent}); return false;" class="block text-base font-semibold mb-2 text-blue-400 hover:text-blue-300 hover:underline">새 글 알림 - ${alert.pageTitle}</a>` : `<a href="#" onclick="markAlertAsReadAndOpen(${alert.id}, '${alert.detectedUrl}', ${alert.sent}); return false;" class="block text-base font-semibold mb-2 text-blue-400 hover:text-blue-300 hover:underline">새 글 알림 - 제목 없음</a>`}
                                <p class="text-sm mb-2">${alert.message}</p>
                                <p class="text-xs text-gray-400">
                                    ${new Date(alert.detectedAt).toLocaleString()}
                                </p>
                            </div>
                            <div class="flex flex-col space-y-2 ml-4">
                                <button onclick="deleteAlert(${alert.id})" class="px-3 py-1 bg-red-900 text-red-300 rounded text-xs hover:bg-red-800">삭제</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('알림 목록 로드 실패:', error);
                showToast('알림 목록 로드 실패', 'error');
            }
        }

        // 알림 읽음 처리
        async function markAlertAsRead(id) {
            try {
                const response = await fetch(`/api/alerts/${id}/mark-sent`, {
                    method: 'PATCH'
                });

                if (response.ok) {
                    loadAlerts();
                } else {
                    showToast('알림 읽음 처리 실패', 'error');
                }
            } catch (error) {
                console.error('알림 읽음 처리 실패:', error);
                showToast('알림 읽음 처리 실패', 'error');
            }
        }

        // 알림 삭제
        async function deleteAlert(id) {
            try {
                const response = await fetch(`/api/alerts/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast('알림이 삭제되었습니다.', 'success');
                    loadAlerts();
                } else {
                    showToast('알림 삭제 실패', 'error');
                }
            } catch (error) {
                console.error('알림 삭제 실패:', error);
                showToast('알림 삭제 실패', 'error');
            }
        }

        // 읽은 알림 전체 삭제
        async function deleteReadAlerts() {
            if (!confirm('읽은 알림을 모두 삭제하시겠습니까?')) {
                return;
            }

            try {
                const response = await fetch('/api/alerts/sent', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    const text = await response.text();
                    showToast(text, 'success');
                    loadAlerts();
                } else {
                    showToast('알림 삭제 실패', 'error');
                }
            } catch (error) {
                console.error('알림 삭제 실패:', error);
                showToast('알림 삭제 실패', 'error');
            }
        }

        // 모든 알림 삭제 (읽음 + 안읽음)
        async function deleteAllAlerts() {
            if (!confirm('모든 알림을 삭제하시겠습니까?')) {
                return;
            }

            try {
                const response = await fetch('/api/alerts/all', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    const text = await response.text();
                    showToast(text, 'success');
                    loadAlerts();
                } else {
                    showToast('알림 삭제 실패', 'error');
                }
            } catch (error) {
                console.error('알림 삭제 실패:', error);
                showToast('알림 삭제 실패', 'error');
            }
        }

        // 알림 읽음 처리 후 URL 열기
        async function markAlertAsReadAndOpen(id, url, isSent) {
            try {
                // 안 읽은 알림인 경우에만 읽음 처리
                if (!isSent) {
                    const response = await fetch(`/api/alerts/${id}/mark-sent`, {
                        method: 'PATCH'
                    });

                    if (response.ok) {
                        loadAlerts(); // 알림 목록 새로고침
                    }
                }

                // URL 열기
                window.open(url, '_blank');
            } catch (error) {
                console.error('알림 처리 실패:', error);
                // 에러가 있어도 URL은 열어줌
                window.open(url, '_blank');
            }
        }

        // 사이트 필터 드롭다운 채우기
        async function loadSitesForFilter() {
            try {
                const response = await fetch('/api/sites');
                const sites = await response.json();

                const siteFilter = document.getElementById('siteFilter');
                if (!siteFilter) return;

                // 기존 옵션 유지하고 사이트 옵션 추가
                siteFilter.innerHTML = '<option value="">전체 사이트</option>';

                sites.forEach(site => {
                    const option = document.createElement('option');
                    option.value = site.id;
                    option.textContent = site.name;
                    siteFilter.appendChild(option);
                });

                console.log(`사이트 필터 로드 완료: ${sites.length}개 사이트`);
            } catch (error) {
                console.error('사이트 필터 로드 실패:', error);
            }
        }

        // 설정 불러오기
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();

                if (settings.length > 0) {
                    const setting = settings[0];
                    document.getElementById('discordWebhookUrl').value = setting.discordWebhookUrl || '';
                    document.getElementById('notificationTitle').value = setting.notificationTitle || '';
                    document.getElementById('settingsEnabled').checked = setting.enabled;
                }
            } catch (error) {
                console.error('설정 로드 실패:', error);
            }
        }

        // 설정 저장
        async function saveSettings(event) {
            event.preventDefault();

            const setting = {
                discordWebhookUrl: document.getElementById('discordWebhookUrl').value,
                notificationTitle: document.getElementById('notificationTitle').value,
                enabled: document.getElementById('settingsEnabled').checked
            };

            try {
                const getResponse = await fetch('/api/settings');
                const settings = await getResponse.json();

                let response;
                if (settings.length > 0) {
                    response = await fetch(`/api/settings/${settings[0].id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(setting)
                    });
                } else {
                    response = await fetch('/api/settings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(setting)
                    });
                }

                if (response.ok) {
                    showToast('설정이 저장되었습니다.', 'success');
                } else {
                    showToast('설정 저장 실패', 'error');
                }
            } catch (error) {
                console.error('설정 저장 실패:', error);
                showToast('설정 저장 실패', 'error');
            }
        }

        // 토스트 알림 표시
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');

            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                info: 'bg-blue-600'
            };

            toast.className = `notification ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg`;
            toast.textContent = message;

            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ==============================================
        // 테스트 코드
        // ==============================================
        function runTests() {
            console.log('🧪 테스트 시작...');

            // 테스트 1: 키워드 분리 테스트
            function testKeywordSplit() {
                const input = "긴급,공지,중요";
                const expected = ["긴급", "공지", "중요"];
                const result = input.split(',').map(k => k.trim()).filter(k => k);
                console.assert(JSON.stringify(result) === JSON.stringify(expected),
                    '❌ 테스트 실패: 키워드 분리');
                console.log('✅ 테스트 통과: 키워드 분리', result);
            }

            // 테스트 2: 공백 키워드 테스트
            function testEmptyKeywords() {
                const input = "";
                const keywords = input.trim() ? input.split(',').map(k => k.trim()).filter(k => k) : [];
                const detectContentChange = keywords.length === 0;
                console.assert(detectContentChange === true,
                    '❌ 테스트 실패: 공백 키워드 시 detectContentChange');
                console.log('✅ 테스트 통과: 공백 키워드 시 detectContentChange = true');
            }

            // 테스트 3: 키워드 있을 때 detectContentChange false 테스트
            function testKeywordsPresent() {
                const input = "긴급,공지";
                const keywords = input.trim() ? input.split(',').map(k => k.trim()).filter(k => k) : [];
                const detectContentChange = keywords.length === 0;
                console.assert(detectContentChange === false,
                    '❌ 테스트 실패: 키워드 있을 때 detectContentChange');
                console.assert(keywords.length === 2,
                    '❌ 테스트 실패: 키워드 개수');
                console.log('✅ 테스트 통과: 키워드 있을 때 detectContentChange = false, 개수 = ', keywords.length);
            }

            // 테스트 4: 공백 포함 키워드 필터링 테스트
            function testKeywordFiltering() {
                const input = "긴급, , 공지, ,중요";
                const keywords = input.split(',').map(k => k.trim()).filter(k => k);
                console.assert(keywords.length === 3,
                    '❌ 테스트 실패: 공백 필터링');
                console.log('✅ 테스트 통과: 공백 필터링', keywords);
            }

            // 테스트 5: 쉼표만 있는 경우
            function testCommaOnly() {
                const input = ",,,";
                const keywords = input.split(',').map(k => k.trim()).filter(k => k);
                console.assert(keywords.length === 0,
                    '❌ 테스트 실패: 쉼표만 있는 경우');
                console.log('✅ 테스트 통과: 쉼표만 있는 경우 키워드 개수 = 0');
            }

            // 테스트 실행
            testKeywordSplit();
            testEmptyKeywords();
            testKeywordsPresent();
            testKeywordFiltering();
            testCommaOnly();

            console.log('🎉 모든 테스트 완료!');
        }
    </script>
