# PostgreSQL datasource
# DB_HOST: Docker Compose 환경은 'postgres', Oracle Cloud VM 직접 배포는 'localhost'
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webmonitor}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:webmonitor}
spring.datasource.password=${DB_PASSWORD:webmonitor}

# Hibernate: Flyway가 스키마를 관리하므로 DDL 자동 생성 비활성화
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway 활성화 (prod 프로필에서만)
spring.flyway.enabled=true

# H2 Console 비활성화
spring.h2.console.enabled=false
