# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/monitor;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (기본값: 비활성화, dev 프로파일에서만 활성화)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration (Database Migration)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Baseline migration for existing schema

# Logging
logging.level.com.webmonitor=DEBUG

# Discord Bot Configuration
discord.bot.token=${DISCORD_BOT_TOKEN:}
discord.bot.enabled=${DISCORD_BOT_ENABLED:false}

# Alert Cleanup Configuration
alert.cleanup.enabled=true
alert.cleanup.days=7
alert.cleanup.keyword-days=7
alert.cleanup.restock-days=30
alert.cleanup.cron=0 0 3 * * *

# Alert Queue Configuration
alert.queue.enabled=true
alert.queue.batch-size=10
alert.queue.fixed-delay=2000

# Discord Webhook URL
discord.webhook.url=${DISCORD_WEBHOOK_URL:}
discord.webhook.max-retries=3
discord.webhook.retry-delay-ms=1000
discord.webhook.rate-limit-wait-ms=60000

# Monitoring Configuration
monitor.rate-limit.min-delay-ms=2000
monitor.rate-limit.max-delay-ms=5000
monitor.failure.alert-threshold=5
monitor.failure.reset-after-success=true
monitor.restock.alert-cooldown-minutes=60
monitor.alert.max-per-site=50
monitor.alert.cleanup-enabled=true
monitor.crawler.max-retries=3
monitor.crawler.retry-delay-ms=1000
monitor.crawler.timeout-ms=5000
monitor.crawler.max-body-size=1048576

# API Security Configuration
api.security.enabled=${API_SECURITY_ENABLED:false}
api.security.key=${API_KEY:}

# Actuator Configuration (운영 모니터링)
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.defaults.enabled=true
management.info.env.enabled=true
info.app.name=Web Monitor
info.app.version=0.0.1-SNAPSHOT
info.app.description=Product Stock Monitoring System with Metrics & Health Checks

# HikariCP Connection Pool Configuration (대용량 트래픽 대비)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Batch Configuration (대량 INSERT/UPDATE 성능 향상)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Transaction Configuration (장기 트랜잭션 방지)
spring.transaction.default-timeout=30

# JPA Query Timeout (장시간 쿼리 방지)
spring.jpa.properties.javax.persistence.query.timeout=10000
spring.jpa.properties.hibernate.query.timeout=10000

# Cache Configuration (반복 조회 성능 향상)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Tomcat Thread Pool Configuration (대용량 트래픽 처리)
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# MVC Async Configuration
spring.mvc.async.request-timeout=30000

# Critical Error Notification Configuration (Phase 4)
critical.notification.enabled=true
critical.notification.cooldown-minutes=15
critical.notification.exception-threshold=10
critical.notification.exception-window-minutes=5

# Resilience4j Configuration (Phase 5)
# Circuit Breaker - 외부 API 호출 실패 방지
resilience4j.circuitbreaker.instances.webCrawler.register-health-indicator=true
resilience4j.circuitbreaker.instances.webCrawler.sliding-window-size=10
resilience4j.circuitbreaker.instances.webCrawler.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.webCrawler.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.webCrawler.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.webCrawler.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.webCrawler.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.webCrawler.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.webCrawler.slow-call-rate-threshold=50

resilience4j.circuitbreaker.instances.discord.register-health-indicator=true
resilience4j.circuitbreaker.instances.discord.sliding-window-size=10
resilience4j.circuitbreaker.instances.discord.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.discord.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.discord.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.discord.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.discord.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.discord.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.discord.slow-call-rate-threshold=50

# Rate Limiter - API 엔드포인트 호출 속도 제한
resilience4j.ratelimiter.instances.api.register-health-indicator=true
resilience4j.ratelimiter.instances.api.limit-for-period=100
resilience4j.ratelimiter.instances.api.limit-refresh-period=10s
resilience4j.ratelimiter.instances.api.timeout-duration=0s
resilience4j.ratelimiter.instances.api.allow-health-indicator-to-fail=true

# Resilience4j Metrics & Actuator
management.endpoints.web.exposure.include=health,info,metrics,env,loggers,circuitbreakers,ratelimiters
management.health.circuitbreakers.enabled=true
management.health.ratelimiters.enabled=true
