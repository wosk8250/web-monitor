# Test Profile Configuration

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Disabled for Testing (use JPA schema generation instead)
spring.flyway.enabled=false

# Logging
logging.level.com.webmonitor=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Disable Schedulers in Tests
alert.cleanup.enabled=false
alert.queue.enabled=false

# Disable Discord in Tests
discord.bot.enabled=false
discord.webhook.url=

# Cache Configuration
spring.cache.type=none
